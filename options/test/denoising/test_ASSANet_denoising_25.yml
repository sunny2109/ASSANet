name: test_ASSANet_color_denoising_25
model_type: SRModel
scale: 1
num_gpu: auto
manual_seed: 0

# dataset and data loader settings
datasets:
  val_0:
    name: Kodak24
    type: DatasetDnCNN
    dataroot_gt: /data2/songlianhong/Color_denoise/Kodak24
    dataroot_lq: ~
    io_backend:
      type: disk

    sigma: 25
    sigma_test: 25

  val_1:
    name: CBSD68
    type: DatasetDnCNN
    dataroot_gt: /data2/songlianhong/Color_denoise/CBSD68
    dataroot_lq: ~
    io_backend:
      type: disk

    sigma: 25
    sigma_test: 25

  val_2:
    name: McMaster
    type: DatasetDnCNN
    dataroot_gt: /data2/songlianhong/Color_denoise/McMaster
    dataroot_lq: ~
    io_backend:
      type: disk

    sigma: 25
    sigma_test: 25

  val_3:
    name: Urban100
    type: DatasetDnCNN
    dataroot_gt: /data2/songlianhong/Color_denoise/Urban100
    dataroot_lq: ~
    io_backend:
      type: disk

    sigma: 25
    sigma_test: 25

# network structures
network_g:
  type: ASSANet
  dim: 160
  num_blocks: 8
  num_layers: 8
  upscale: 1
  num_heads: 1
  ffn_expansion_factor: 2.0
  img_range: 1.
  use_pixelunshuffle: True
  tlc_flag: True
  tlc_kernel: 72
  activation: 'relu'

# path
path:
  pretrain_network_g: experiments/pretrained_models/Denoising/ASSANet_25.pth
  strict_load_g: true
  resume_state: ~

# validation settings
val:
  save_img: false
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

# dist training settings
dist_params:
  backend: nccl
  port: 22144