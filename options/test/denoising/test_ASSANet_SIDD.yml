name: test_ASSANet_SIDD
model_type: SRModel
scale: 1
num_gpu: auto
manual_seed: 0

# dataset and data loader settings
datasets:
  val_0:
    name: SIDD_val
    type: PairedImageDataset
    dataroot_gt: /data2/songlianhong/SIDD/val/target_crops/
    dataroot_lq: /data2/songlianhong/SIDD/val/input_crops/
    io_backend:
      type: disk

# network structures
network_g:
  type: ASSANet
  dim: 160
  num_blocks: 8
  num_layers: 8
  upscale: 1
  num_heads: 1
  ffn_expansion_factor: 2.0
  img_range: 1.
  use_pixelunshuffle: True
  tlc_flag: True
  tlc_kernel: 72
  activation: 'relu'

# path
path:
  pretrain_network_g: experiments/pretrained_models/Denoising/ASSANet_SIDD.pth
  strict_load_g: true
  resume_state: ~

# validation settings
val:
  save_img: false
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: false

# dist training settings
dist_params:
  backend: nccl
  port: 22144