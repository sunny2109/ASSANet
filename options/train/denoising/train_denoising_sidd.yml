name: ASSANet_SIDD_160C8G8B_p128
model_type: SRModel
scale: 1
num_gpu: auto # 8
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: SIDD_train
    type: PairedImageDataset
    dataroot_gt: /data2/songlianhong/SIDD/train/target_crops/
    dataroot_lq: /data2/songlianhong/SIDD/train/input_crops/
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 128
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 1
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  # --- validation
  val_0:
    name: SIDD_val
    type: PairedImageDataset
    dataroot_gt: /data2/songlianhong/SIDD/val/target_crops/
    dataroot_lq: /data2/songlianhong/SIDD/val/input_crops/
    io_backend:
      type: disk


# network structures
network_g:
  type: ASSANet
  dim: 160
  num_blocks: 8
  num_layers: 8
  upscale: 1
  num_heads: 1
  ffn_expansion_factor: 2.0
  img_range: 1.
  use_pixelunshuffle: True
  tlc_flag: False
  tlc_kernel: 128
  activation: 'relu'

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# all the training settings are based on SwinIR except for learning rate
# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 3e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [150000, 210000, 250000, 275000]
    gamma: 0.5

  total_iter: 300000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  fft_opt:
    type: FFTLoss
    loss_weight: 0.05
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: false

# logging settings
logger:
  print_freq: 500
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true

# dist training settings
dist_params:
  backend: nccl
  port: 29500