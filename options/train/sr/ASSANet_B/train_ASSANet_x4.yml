# general settings
name: AASSANet_90C8G4B_x4_FFT_b32_relu_new
model_type: SRModel
scale: 4
num_gpu: auto
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: DIV2K
    type: PairedImageDataset
    dataroot_gt: /data0/SISR_dataset/DIV2K/DIV2K_train_HR_sub
    dataroot_lq: /data0/SISR_dataset/DIV2K/DIV2K_train_LR_bicubic/X4_sub
    meta_info_file: basicsr/data/meta_info/meta_info_DIV2K800sub_GT.txt
    filename_tmpl: '{}'
    io_backend:
      type: disk

    gt_size: 192
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 16
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  # --- validation
