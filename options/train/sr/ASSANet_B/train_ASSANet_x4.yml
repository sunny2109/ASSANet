    filename_tmpl: '{}x4'
    io_backend:
      type: disk


# network structures
# Large Setting: 90C-8G-4B-2FFNExpansion
network_g:
  type: AASSANet
  dim: 90
  num_blocks: 4
  num_layers: 8
  upscale: 4
  num_heads: 1
  ffn_expansion_factor: 2.0
  img_range: 1.
  tlc_flag: True
  tlc_kernel: 48
  activation: 'relu'

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# all the training settings are based on SwinIR except for learning rate
# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 5e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1  # no warm up
  # use_grad_clip: True

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  fft_opt:
    type: FFTLoss
    loss_weight: 0.05
    reduction: mean

# validation settings
val:
  val_freq: !!float 1e4
  save_img: false

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true

# logging settings
logger:
  print_freq: 2000
  save_checkpoint_freq: !!float 1e4
  use_tb_logger: true

# dist training settings
dist_params:
  backend: nccl
  port: 29500